# ─── 3. COTO — API propia ─────────────────────────────────────────────────────
def scrape_coto() -> list[dict]:
    log.info("🟡 Coto (API JSON)...")
    res = []
    s = session("https://www.cotodigital3.com.ar/")
    s.headers["Accept"] = "application/json, text/javascript, */*; q=0.01"
    s.headers["X-Requested-With"] = "XMLHttpRequest"

    categorias_coto = [
        ("Almacén",  "/sitios/cdigi/browse?_dyncharset=utf-8&Dy=1&Nrpp=48&Nu=P_Def_Or&Nrp=0&N=4294964729"),
        ("Lácteos",  "/sitios/cdigi/browse?_dyncharset=utf-8&Dy=1&Nrpp=48&Nu=P_Def_Or&Nrp=0&N=4294964762"),
        ("Bebidas",  "/sitios/cdigi/browse?_dyncharset=utf-8&Dy=1&Nrpp=48&Nu=P_Def_Or&Nrp=0&N=4294964765"),
        ("Limpieza", "/sitios/cdigi/browse?_dyncharset=utf-8&Dy=1&Nrpp=48&Nu=P_Def_Or&Nrp=0&N=4294964755"),
    ]
    base = "https://www.cotodigital3.com.ar"

    for cat_nombre, path in categorias_coto:
        r = safe_get(s, base + path)
        if not r: time.sleep(DELAY); continue
        try:
            from bs4 import BeautifulSoup
            soup = BeautifulSoup(r.text, "lxml")
            items = soup.select(".product-card, .catalogEntryContentCell")
            for item in items:
                nombre_el = item.select_one(".product-name, .description")
                precio_el = item.select_one(".atg_store_newPrice, .price-value")
                prev_el   = item.select_one(".atg_store_oldPrice")
                img_el    = item.select_one("img")
                link_el   = item.select_one("a[href]")
                if not nombre_el or not precio_el: continue
                precio = _parse_precio(precio_el.get_text())
                precio_ant = _parse_precio(prev_el.get_text()) if prev_el else None
                if not precio: continue
                res.append(oferta(
                    producto=nombre_el.get_text(strip=True),
                    precio=precio, precio_anterior=precio_ant,
                    supermercado="Coto",
                    url=base+(link_el["href"] if link_el else ""),
                    imagen_url=img_el.get("src") if img_el else None,
                    categoria=categorizar(nombre_el.get_text()),
                ))
        except Exception as e:
            log.warning(f"  Coto parse error: {e}")
        time.sleep(DELAY)

    log.info(f"  → {len(res)} de Coto")
    return res

