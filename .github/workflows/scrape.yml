name: Scraper Diario de Ofertas

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Correr el scraper
        run: |
          python scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Configurar git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commitear JSONs actualizados
        run: |
          git add data/ofertas.json
          git diff --staged --quiet || git commit -m "🛒 Actualización automática de ofertas - $(TZ='America/Argentina/Buenos_Aires' date '+%d/%m/%Y %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
