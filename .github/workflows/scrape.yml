# ─── 7. MAXICONSUMO — scraping HTML ────────────────────────────────────────────
def scrape_maxiconsumo() -> list[dict]:
    log.info("🟤 Maxiconsumo (HTML)...")
    res = []
    s = session("https://www.maxiconsumo.com/")
    from bs4 import BeautifulSoup

    urls = [
        "https://www.maxiconsumo.com/ofertas-especiales",
        "https://www.maxiconsumo.com/almacen",
        "https://www.maxiconsumo.com/bebidas",
    ]

    for url in urls:
        r = safe_get(s, url)
        if not r: time.sleep(DELAY); continue
        try:
            soup = BeautifulSoup(r.text, "lxml")
            items = soup.select(".product-item-info, .item.product")
            for item in items:
                nombre_el = item.select_one(".product-item-name, .product-name")
                precio_el = item.select_one(".special-price .price, .price")
                prev_el   = item.select_one(".old-price .price, .regular-price .price")
                img_el    = item.select_one("img.product-image-photo, img")
                link_el   = item.select_one("a.product-item-link, a")
                if not nombre_el or not precio_el: continue
                precio = _parse_precio(precio_el.get_text())
                precio_ant = _parse_precio(prev_el.get_text()) if prev_el else None
                if not precio: continue
                res.append(oferta(
                    producto=nombre_el.get_text(strip=True),
                    precio=precio, precio_anterior=precio_ant,
                    supermercado="Maxiconsumo",
                    url=link_el["href"] if link_el and link_el.get("href") else url,
                    imagen_url=img_el.get("src") if img_el else None,
                    categoria="mayorista",
                ))
        except Exception as e:
            log.warning(f"  Maxiconsumo parse error: {e}")
        time.sleep(DELAY)

    log.info(f"  → {len(res)} de Maxiconsumo")
    return res

# ─── 8. DIARCO — HTML ─────────────────────────────────────────────────────────
def scrape_diarco() -> list[dict]:
    log.info("🟤 Diarco (HTML)...")
    res = []
    s = session("https://www.diarco.com.ar/")
    from bs4 import BeautifulSoup

    r = safe_get(s, "https://www.diarco.com.ar/ofertas")
    if not r:
        log.warning("  → Diarco no respondió")
        return []
    try:
        soup = BeautifulSoup(r.text, "lxml")
        items = soup.select(".product-card, .product, article")
        for item in items:
            nombre_el = item.select_one("h2,h3,h4,.title,.name")
            precio_el = item.select_one(".price,[class*='price']")
            img_el    = item.select_one("img")
            if not nombre_el or not precio_el: continue
            precio = _parse_precio(precio_el.get_text())
            if not precio: continue
            res.append(oferta(
                producto=nombre_el.get_text(strip=True),
                precio=precio, supermercado="Diarco",
                url="https://www.diarco.com.ar/ofertas",
                imagen_url=img_el.get("src") if img_el else None,
                categoria="mayorista",
            ))
    except Exception as e:
        log.warning(f"  Diarco parse error: {e}")

    log.info(f"  → {len(res)} de Diarco")
    return res

# ─── Helpers ───────────────────────────────────────────────────────────────────
def _parse_precio(txt: str) -> Optional[float]:
    if not txt: return None
    limpio = re.sub(r"[^\d,.]","", txt.strip())
    limpio = limpio.replace(".","").replace(",",".")
    try: return round(float(limpio), 2)
    except: return None

# ─── MAIN ──────────────────────────────────────────────────────────────────────
def main():
    log.info("="*55)
    log.info(f"SuperAhorro GBA — Scraper {FECHA_H}")
    log.info("="*55)

    scrapers = [
        ("Carrefour",   scrape_carrefour),
        ("Día",         scrape_dia),
        ("Coto",        scrape_coto),
        ("Jumbo",       scrape_jumbo),
        ("Changomas",   scrape_changomas),
        ("Vea",         scrape_vea),
        ("Maxiconsumo", scrape_maxiconsumo),
        ("Diarco",      scrape_diarco),
    ]

    for nombre, fn in scrapers:
        try:
            items = fn()
            # Solo guardar si tiene descuento o precio concreto
            validos = [i for i in items if i.get("precio")]
            RESULTADOS.extend(validos)
        except Exception as e:
            log.error(f"❌ Error crítico en {nombre}: {e}")

    # Deduplicar
    vistos, unicos = set(), []
    for o in RESULTADOS:
        key = (o["producto"][:60], o["supermercado"], o["precio"])
        if key not in vistos:
            vistos.add(key)
            unicos.append(o)

    # Ordenar por % descuento
    unicos.sort(key=lambda x: x.get("descuento_pct") or 0, reverse=True)

    output = {
        "meta": {
            "ultima_actualizacion": FECHA_H,
            "fecha":                FECHA,
            "total_ofertas":        len(unicos),
            "supermercados":        sorted({o["supermercado"] for o in unicos}),
        },
        "ofertas": unicos,
    }

    with open(OUTPUT, "w", encoding="utf-8") as f:
        json.dump(output, f, ensure_ascii=False, indent=2)

    log.info("="*55)
    log.info(f"✅ {len(unicos)} ofertas únicas guardadas en {OUTPUT}")
    log.info("="*55)

if __name__ == "__main__":
    main()
