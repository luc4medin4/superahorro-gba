"""
scraper.py — SuperAhorro GBA
Usa APIs internas de cada supermercado (sin Selenium, sin JS).
Corre diariamente via GitHub Actions a las 7am Argentina.
"""

import json
import time
import logging
import re
from datetime import datetime, timezone, timedelta
from pathlib import Path
from typing import Optional

import requests
from fake_useragent import UserAgent

# ─── Config ───────────────────────────────────────────────────────────────────
logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s", datefmt="%H:%M:%S")
log = logging.getLogger(__name__)

TZ_AR   = timezone(timedelta(hours=-3))
AHORA   = datetime.now(TZ_AR)
FECHA   = AHORA.strftime("%Y-%m-%d")
FECHA_H = AHORA.strftime("%Y-%m-%dT%H:%M:%S-03:00")

DATA_DIR = Path(__file__).parent / "data"
DATA_DIR.mkdir(exist_ok=True)
OUTPUT   = DATA_DIR / "ofertas.json"

try:
    _ua = UserAgent()
    def rnd_ua(): return _ua.random
except Exception:
    def rnd_ua(): return "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"

DELAY = 2
TIMEOUT = 25
RESULTADOS: list[dict] = []

CATEGORIAS = {
    "carnes":          ["carne","pollo","cerdo","asado","bife","chorizo","vacío","nalga","pechuga","costilla","milanesa"],
    "lacteos":         ["leche","yogur","queso","manteca","crema","ricota","flan","postre"],
    "bebidas":         ["gaseosa","agua","jugo","cerveza","vino","cola","fanta","sprite","7up","schweppes","sidra","energizante"],
    "limpieza":        ["lavandina","detergente","jabón","suavizante","quitamanchas","limpiador","desengrasante","esponja","trapo"],
    "almacen":         ["arroz","fideos","harina","azúcar","aceite","sal","yerba","café","te ","sopa","caldo","puré","tomate triturado","lenteja","garbanzo","poroto"],
    "panaderia":       ["pan ","galletita","tostada","facturas","medialunas","bizcocho","budín","alfajor","oblea"],
    "frutas_verduras": ["fruta","manzana","banana","naranja","papa","cebolla","tomate","lechuga","zanahoria","limón","mandarina"],
    "higiene":         ["shampoo","desodorante","jabón líquido","cepillo","pasta dental","enjuague","pañal","toallita","afeitadora"],
    "congelados":      ["congelado","medallón","nugget","pizza","helado","bastón","rebozado"],
    "fiambre":         ["jamón","salame","paleta","mortadela","salchicha","longaniza","pepperoni","pastrón"],
    "mayorista":       ["fardo","pack x","caja x","display","por mayor","bulto"],
}

def categorizar(nombre: str) -> str:
    n = nombre.lower()
    for cat, kws in CATEGORIAS.items():
        if any(k in n for k in kws):
            return cat
    return "general"

def oferta(producto, precio, supermercado, url,
           precio_anterior=None, imagen_url=None,
           categoria=None, sucursal=None, vencimiento=None) -> dict:
    desc = None
    if precio and precio_anterior and precio_anterior > precio:
        desc = round((1 - precio / precio_anterior) * 100, 1)
    return {
        "producto":       producto.strip()[:200],
        "precio":         round(float(precio), 2) if precio else None,
        "precio_anterior":round(float(precio_anterior), 2) if precio_anterior else None,
        "descuento_pct":  desc,
        "supermercado":   supermercado,
        "sucursal":       sucursal,
        "categoria":      categoria or categorizar(producto),
        "fecha_scrape":   FECHA,
        "fecha_vencimiento": vencimiento,
        "url_fuente":     url,
        "imagen_url":     imagen_url,
    }

def session(referer="") -> requests.Session:
    s = requests.Session()
    s.headers.update({
        "User-Agent":      rnd_ua(),
        "Accept":          "application/json, text/plain, */*",
        "Accept-Language": "es-AR,es;q=0.9",
        "Accept-Encoding": "gzip, deflate, br",
        "Connection":      "keep-alive",
    })
    if referer:
        s.headers["Referer"] = referer
        s.headers["Origin"]  = referer.rstrip("/")
    return s

def safe_get(s, url, **kw):
    try:
        r = s.get(url, timeout=TIMEOUT, **kw)
        r.raise_for_status()
        return r
    except Exception as e:
        log.warning(f"  ✗ GET {url[:80]}… → {e}")
        return None

def safe_post(s, url, **kw):
    try:
        r = s.post(url, timeout=TIMEOUT, **kw)
        r.raise_for_status()
        return r
    except Exception as e:
        log.warning(f"  ✗ POST {url[:80]}… → {e}")
        return None

# ─── 1. CARREFOUR — API Vtex ───────────────────────────────────────────────────
def scrape_carrefour() -> list[dict]:
    log.info("🔵 Carrefour (Vtex API)...")
    res = []
    s = session("https://www.carrefour.com.ar/")
    s.headers["x-vtex-user-agent"] = "store-graphql"

    # Categorías con más volumen de ofertas
    colecciones = [
        ("ofertas",          "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=productClusterIds:140&_from=0&_to=49"),
        ("supermercado",     "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Supermercado/&O=OrderByBestDiscountDESC&_from=0&_to=49"),
        ("almacen",          "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Supermercado/Almacen/&O=OrderByBestDiscountDESC&_from=0&_to=29"),
        ("lacteos",          "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Supermercado/Lacteos/&O=OrderByBestDiscountDESC&_from=0&_to=29"),
        ("carnes",           "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Supermercado/Carnes-y-Aves/&O=OrderByBestDiscountDESC&_from=0&_to=29"),
        ("bebidas",          "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Supermercado/Bebidas/&O=OrderByBestDiscountDESC&_from=0&_to=29"),
        ("limpieza",         "https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=C:/Limpieza/&O=OrderByBestDiscountDESC&_from=0&_to=29"),
    ]

    for nombre, url in colecciones:
        r = safe_get(s, url)
        if not r:
            time.sleep(DELAY); continue
        try:
            productos = r.json()
            for p in productos:
                nombre_p = p.get("productName","")
                items = p.get("items",[])
                if not items: continue
                sellers = items[0].get("sellers",[])
                if not sellers: continue
                offer = sellers[0].get("commertialOffer",{})
                precio     = offer.get("Price")
                precio_ant = offer.get("ListPrice")
                if not precio: continue
                img = items[0].get("images",[{}])[0].get("imageUrl","")
                link = f"https://www.carrefour.com.ar/{p.get('linkText','')}/p"
                res.append(oferta(
                    producto=nombre_p, precio=precio,
                    precio_anterior=precio_ant if precio_ant and precio_ant > precio else None,
                    supermercado="Carrefour", url=link, imagen_url=img or None,
                ))
        except Exception as e:
            log.warning(f"  Carrefour parse error ({nombre}): {e}")
        time.sleep(DELAY)

    log.info(f"  → {len(res)} de Carrefour")
    return res

